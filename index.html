    <!-- INLINE SERVICE WORKER via blob — works from a single HTML file, no server needed -->
    <script>
        (function () {
            if (!('serviceWorker' in navigator)) return;
            const SW_CODE = `
const CACHE = 'trackulation-v1';
self.addEventListener('install', e => {
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(self.clients.claim());
});
self.addEventListener('fetch', e => {
  e.respondWith(
    caches.open(CACHE).then(cache =>
      cache.match(e.request).then(cached => {
        if (cached) return cached;
        return fetch(e.request).then(resp => {
          cache.put(e.request, resp.clone());
          return resp;
        }).catch(() => cached);
      })
    )
  );
});
`;
            const blob = new Blob([SW_CODE], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(swUrl, { scope: '/' }).catch(() => { });
        })();
    </script>

    <!-- INLINE MANIFEST via link — gives "Add to Home Screen" a proper icon + name -->
    <script>
        (function () {
            const manifest = {
                name: "Trackulation",
                short_name: "Trackulation",
                description: "Privacy-first women's health tracker",
                start_url: ".",
                display: "standalone",
                background_color: "#FFF5F5",

                orientation: "portrait",
                icons: [{
                    src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Ccircle cx='96' cy='96' r='96' fill='%23FFD1DC'/%3E%3Ccircle cx='56' cy='60' r='28' fill='%23FF80AB' opacity='.85'/%3E%3Ccircle cx='136' cy='60' r='28' fill='%23FF80AB' opacity='.85'/%3E%3Ccircle cx='56' cy='60' r='16' fill='%23FF80AB' opacity='.5'/%3E%3Ccircle cx='136' cy='60' r='16' fill='%23FF80AB' opacity='.5'/%3E%3Ccircle cx='96' cy='114' r='58' fill='%23FF80AB'/%3E%3Ccircle cx='78' cy='104' r='11' fill='white' opacity='.9'/%3E%3Ccircle cx='114' cy='104' r='11' fill='white' opacity='.9'/%3E%3Ccircle cx='81' cy='107' r='6' fill='%23333'/%3E%3Ccircle cx='111' cy='107' r='6' fill='%23333'/%3E%3Cellipse cx='96' cy='122' rx='18' ry='13' fill='%23FF80AB' opacity='.6'/%3E%3Cellipse cx='96' cy='126' rx='9' ry='7' fill='%23e64980'/%3E%3C/svg%3E",
                    sizes: "192x192",
                    type: "image/svg+xml",
                    purpose: "any maskable"
                }]
            };
            const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('link');
            link.rel = 'manifest'; link.href = url;
            document.head.appendChild(link);
        })();

<body>
    <div id="offline-bar">📴 Offline mode — all data saved locally</div>
    <div id="app">
        <div class="header">
            <div class="header-inner">
                <div class="logo-row">
                    <svg width="32" height="32" viewBox="0 0 48 48" fill="none" id="header-bear"></svg>

                        <div class="app-name">trackulation 🌸</div>
                        <div class="app-date" id="header-date"></div>
                    </div>
                </div>
                <div class="phase-badge" id="phase-badge"></div>
            </div>
        </div>

        <nav class="bottom-nav" id="bottom-nav"></nav>
    </div>

    <!-- SETUP MODAL -->
    <div class="modal-overlay" id="setup-modal" style="display:none">
        <div class="modal">
            <svg width="56" height="56" viewBox="0 0 48 48" fill="none" id="modal-bear"></svg>
            <h2>Namaste! 🌸</h2>
            <p>Trackulation mein aapka swagat hai!<br />Chaliye shuru karte hain.</p>
            <div class="form-group">
                <label class="form-label">Aakhri period kab aaya? 📅</label>
                <input type="date" id="setup-date" max="" />
            </div>
            <div class="form-group">
                <label class="form-label" id="setup-len-label">Cycle kitne din ka hai? (28 din)</label>
                <input type="range" min="21" max="40" value="28" id="setup-len"
                    oninput="document.getElementById('setup-len-label').textContent='Cycle kitne din ka hai? ('+this.value+' din)'" />
                <div class="range-hints"><span>21 din</span><span>28 (avg)</span><span>40 din</span></div>
            </div>
            <button class="btn btn-primary" onclick="saveSetup()">Shuru Karein 🧸</button>
        </div>
    </div>

    <script>
        // ── OFFLINE DETECTION ──────────────────────────────────────────────────────
        window.addEventListener('online', () => { document.getElementById('offline-bar').style.display = 'none' });
        window.addEventListener('offline', () => { document.getElementById('offline-bar').style.display = 'block' });
        if (!navigator.onLine) document.getElementById('offline-bar').style.display = 'block';

        // ── CACHE ENTIRE PAGE IN LOCALSTORAGE AS FALLBACK ─────────────────────────
        // This is the key trick for single-file offline: store the full HTML in
        // localStorage on first load, then a tiny SW serves it back when offline.
        (function () {
            try {
                const key = 'trackulation_page_cache';
                const html = document.documentElement.outerHTML;
                // Only save once to avoid quota issues
                if (!localStorage.getItem(key)) {
                    localStorage.setItem(key, html);
                }
            } catch (e) { }
        })();

        // ── DATA LAYER ─────────────────────────────────────────────────────────────
        const KEYS = { settings: 'tk_settings', cycles: 'tk_cycles', symptoms: 'tk_symptoms', checklist: 'tk_checklist' };
        function load(k, d) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d } catch { return d } }
        function save(k, v) { try { localStorage.setItem(k, JSON.stringify(v)) } catch { } }

        let settings = load(KEYS.settings, {});
        let cycles = load(KEYS.cycles, []);
        let symptoms = load(KEYS.symptoms, []);
        let checklist = load(KEYS.checklist, {});
        let currentTab = 'home';

        // ── PHASES ─────────────────────────────────────────────────────────────────
        const PHASES = {
            menstrual: { name: 'Menstrual', hi: 'Masik Dharm 🌸', color: '#FF80AB', bg: '#FFD1DC', emoji: '🌸', info: 'Aapka body rest maang raha hai. Garam paani, gentle movement, aur iron-rich food pe focus karein.' },
            follicular: { name: 'Follicular', hi: 'Utthan Kaal ✨', color: '#F06292', bg: '#FCE4EC', emoji: '✨', info: 'Energy badhne lag rahi hai! Naye projects start karo, gym jao, creativity unleash karo!' },
            ovulation: { name: 'Ovulation', hi: 'Ovulation 🌺', color: '#E91E63', bg: '#FFDDE9', emoji: '🌺', info: 'Peak energy aur confidence! Important decisions aur social connections ka best time!' },
            luteal: { name: 'Luteal', hi: 'Luteal Kaal 🍵', color: '#AD1457', bg: '#F8BBD0', emoji: '🍵', info: 'Body slowdown mode mein. Magnesium lo, jaldi soyo, aur journaling karo.' }
        };
        function getPhase(d) { return d <= 5 ? 'menstrual' : d <= 13 ? 'follicular' : d <= 16 ? 'ovulation' : 'luteal' }
        function getDayCycle(last, len) {
            const t = new Date(); t.setHours(0, 0, 0, 0);
            const s = new Date(last); s.setHours(0, 0, 0, 0);
            const diff = Math.floor((t - s) / 86400000);
            return ((diff % (len || 28)) + 1);
        }
        function predict(cycs) {
            if (!cycs || !cycs.length) return { avg: 28, irregular: false, next: null };
            const lens = cycs.map(c => c.length).filter(l => l >= 15 && l <= 45);
            if (!lens.length) return { avg: 28, irregular: false, next: null };
            const avg = Math.round(lens.reduce((a, b) => a + b, 0) / lens.length);
            const irregular = lens.some(l => l < 21 || l > 35);
            const last = cycs[cycs.length - 1];
            const next = last ? new Date(new Date(last.startDate).getTime() + avg * 86400000) : null;
            return { avg, irregular, next };
        }

        // ── CHECKLISTS ─────────────────────────────────────────────────────────────
        const LISTS = {
            menstrual: [
                { id: 'm1', t: 'Ajwain (Carom) water peeyein 🫖', a: true },
                { id: 'm2', t: 'Iron-rich foods: Palak, Dates, Rajma 🥬' },

        // ── PHASE WHEEL ────────────────────────────────────────────────────────────
        function phaseWheelSVG(dayOfCycle, cycleLen, phase) {
            const segs = [
                { p: 'menstrual', s: 1, e: 5, label: '🌸 Masik', color: '#FF80AB' },
                { p: 'follicular', s: 6, e: 13, label: '✨ Utthan', color: '#F48FB1' },
                { p: 'ovulation', s: 14, e: 16, label: '🌺 Ovul.', color: '#F06292' },
                { p: 'luteal', s: 17, e: cycleLen, label: '🍵 Luteal', color: '#E91E63' }
            ];
            const cx = 150, cy = 150;
            function p2c(ang, rad) { const a = ang * Math.PI / 180; return { x: cx + rad * Math.cos(a), y: cy + rad * Math.sin(a) } }
            function arc(sa, ea, ri, ro) {
                const s1 = p2c(sa + 1, ro), e1 = p2c(ea - 1, ro), s2 = p2c(ea - 1, ri), e2 = p2c(sa + 1, ri);
                const lg = ea - sa > 180 ? 1 : 0;
                return `M${s1.x} ${s1.y} A${ro} ${ro} 0 ${lg} 1 ${e1.x} ${e1.y} L${s2.x} ${s2.y} A${ri} ${ri} 0 ${lg} 0 ${e2.x} ${e2.y}Z`;
            }
            let paths = '', labels = '';
            segs.forEach(seg => {
                const sa = ((seg.s - 1) / cycleLen) * 360 - 90, ea = (seg.e / cycleLen) * 360 - 90;
                const isCur = seg.p === phase;
                paths += `<path d="${arc(sa, ea, 64, 118)}" fill="${isCur ? seg.color : seg.color + '44'}" stroke="white" stroke-width="2"/>`;
                const mid = (sa + ea) / 2, lp = p2c(mid, 91);
                labels += `<text x="${lp.x}" y="${lp.y}" text-anchor="middle" dominant-baseline="central" font-size="8.5" fill="${isCur ? 'white' : '#FF80AB'}" font-weight="${isCur ? 700 : 500}">${seg.label}</text>`;
            });
            const na = ((dayOfCycle - 1) / cycleLen) * 360 - 90;
            const nt = p2c(na, 104), nb = p2c(na + 180, 17);
            const ph = PHASES[phase];
            return `<svg width="100%" viewBox="0 0 300 300" style="max-width:280px">
<circle cx="${cx}" cy="${cy}" r="128" fill="#FFF5F5" stroke="#FFD1DC" stroke-width="1.5"/>
${paths}
${Array.from({ length: cycleLen }, (_, i) => { const a = (i / cycleLen) * 360 - 90, i1 = p2c(a, 119), o1 = p2c(a, 125); return `<line x1="${i1.x}" y1="${i1.y}" x2="${o1.x}" y2="${o1.y}" stroke="#FFD1DC" stroke-width="1"/>`; }).join('')}
${labels}
<circle cx="${cx}" cy="${cy}" r="61" fill="white" stroke="#FFD1DC" stroke-width="1.5"/>
<text x="${cx}" y="${cy - 20}" text-anchor="middle" font-size="26" dominant-baseline="central">${ph.emoji}</text>
<text x="${cx}" y="${cy + 6}" text-anchor="middle" font-size="22" font-weight="800" fill="${ph.color}" dominant-baseline="central">${dayOfCycle}</text>
<text x="${cx}" y="${cy + 22}" text-anchor="middle" font-size="9" fill="#AD1457" dominant-baseline="central">Day of Cycle</text>
<line x1="${nb.x}" y1="${nb.y}" x2="${nt.x}" y2="${nt.y}" stroke="#AD1457" stroke-width="2.5" stroke-linecap="round"/>
<circle cx="${cx}" cy="${cy}" r="6" fill="#AD1457" stroke="white" stroke-width="2"/>
<circle cx="${cx}" cy="${cy}" r="2.5" fill="white"/>
</svg>`;
        }

        <div><div style="font-size:11px;color:var(--deep);margin-bottom:4px">Khatam hua</div><input type="date" id="cyc-end" value="${newCycleEnd}" oninput="newCycleEnd=this.value" max="${new Date().toISOString().split('T')[0]}"></div>

      <button class="btn btn-primary" id="cyc-save-btn" onclick="saveCycle()">Period Log Karo 🌸</button>`;
                if (cycles.length) {

        // ── ACTIONS ────────────────────────────────────────────────────────────────
        function switchTab(t) { currentTab = t; renderPage() }

        function toggleCheck(key, id) {
            const ch = checklist[key] || [];
            checklist = { ...checklist, [key]: ch.includes(id) ? ch.filter(x => x !== id) : [...ch, id] };
            save(KEYS.checklist, checklist);
            renderPage();
        }

        function toggleSym(btn, val, type) {
            if (type === 'sym') {
                selSymptoms = selSymptoms.includes(val) ? selSymptoms.filter(x => x !== val) : [...selSymptoms, val];
                btn.className = 'chip ' + (selSymptoms.includes(val) ? 'on' : 'off');
            } else {
                selFoods = selFoods.includes(val) ? selFoods.filter(x => x !== val) : [...selFoods, val];
                btn.className = 'chip ' + (selFoods.includes(val) ? 'food-on' : 'off');
            }
        }

        function updateIntensity(v) {
            symIntensity = +v;
            const labels = ['', 'Bahut Halka', 'Halka', 'Theek', 'Tez', 'Bahut Tez'];
            document.querySelectorAll('.section-label').forEach(el => { if (el.textContent.startsWith('🌡️')) el.textContent = '🌡️ Intensity: ' + labels[+v]; });
        }

        function saveSymptom() {
            const note = document.getElementById('sym-note')?.value || '';
            const entry = { id: Date.now(), date: new Date().toISOString().split('T')[0], symptoms: [...selSymptoms], foods: [...selFoods], note, intensity: symIntensity };
            symptoms = [entry, ...symptoms].slice(0, 90);
            save(KEYS.symptoms, symptoms);
            selSymptoms = []; selFoods = []; symNote = ''; symIntensity = 3;
            const btn = document.getElementById('sym-save-btn');
            if (btn) { btn.textContent = '✓ Saved Ho Gaya! 🌸'; btn.className = 'btn btn-success'; setTimeout(() => renderPage(), 1500); }
        }

        function saveCycle() {
            const s = document.getElementById('cyc-start')?.value || newCycleStart;
            const e = document.getElementById('cyc-end')?.value || newCycleEnd;
            if (!s || !e) return;
            const length = Math.round((new Date(e) - new Date(s)) / 86400000);
            if (length < 1 || length > 70) return;
            cycles = [...cycles, { id: Date.now(), startDate: s, endDate: e, length }].sort((a, b) => new Date(a.startDate) - new Date(b.startDate)).slice(-12);
            save(KEYS.cycles, cycles);
            settings = { ...settings, lastPeriod: s };
            save(KEYS.settings, settings);
            newCycleStart = ''; newCycleEnd = '';
            const btn = document.getElementById('cyc-save-btn');
            if (btn) { btn.textContent = '✓ Log Ho Gaya!'; btn.className = 'btn btn-success'; setTimeout(() => renderPage(), 1500); }
        }

        function saveSetup() {
            const d = document.getElementById('setup-date').value;
            const l = +document.getElementById('setup-len').value;
            if (!d) return;
            settings = { ...settings, lastPeriod: d, cycleLength: l };
            save(KEYS.settings, settings);
            document.getElementById('setup-modal').style.display = 'none';
            renderPage();
        }

        function generateReport() {
            const n = document.getElementById('rep-name')?.value || reportName || '';
            const a = document.getElementById('rep-age')?.value || reportAge || '';
            const { day, phase } = getDayAndPhase();
            const pred = predict(cycles);
            const freqMap = {}, foodMap = {};
            symptoms.slice(0, 30).forEach(log => {
                log.symptoms.forEach(s => { freqMap[s] = (freqMap[s] || 0) + 1 });
                log.foods.forEach(f => { foodMap[f] = (foodMap[f] || 0) + 1 });
            });
            const topSyms = Object.entries(freqMap).sort((a, b) => b[1] - a[1]).slice(0, 5);
            const topFoods = Object.entries(foodMap).sort((a, b) => b[1] - a[1]).slice(0, 3);
            const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Gynecologist Report</title><style>body{font-family:Georgia,serif;margin:40px;color:#333}h1{color:#AD1457;border-bottom:2px solid #FFD1DC;padding-bottom:10px}h2{color:#E91E63;margin-top:24px;font-size:15px}.meta{background:#FFF5F5;padding:16px;border-radius:8px;margin:20px 0;border:1px solid #FFD1DC}.tag{display:inline-block;background:#FFD1DC;color:#AD1457;padding:3px 10px;border-radius:12px;margin:3px;font-size:12px}.alert{background:#FFDDE9;border:1px solid #E91E63;padding:12px;border-radius:8px;color:#AD1457}table{width:100%;border-collapse:collapse;margin-top:8px;font-size:13px}td,th{padding:8px 12px;border:1px solid #FFD1DC;text-align:left}th{background:#FFF5F5;color:#AD1457}@media print{body{margin:20px}}</style></head><body>
<h1>🌸 Menstrual Health Report</h1>
<div class="meta"><b>Patient Name:</b> ${n || '—'}<br/><b>Age:</b> ${a || '—'}<br/><b>Report Generated:</b> ${new Date().toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' })}<br/><b>Current Cycle Day:</b> Day ${day} (${PHASES[phase].name} Phase)<br/><b>Average Cycle Length:</b> ${pred.avg} days<br/>${pred.next ? `<b>Next Period Expected:</b> ${pred.next.toLocaleDateString('en-IN')}<br/>` : ''}
<b>Irregular Cycles:</b> ${pred.irregular ? '⚠️ Yes – some cycles outside 21-35 day range' : '✅ No'}</div>
${pred.irregular ? `<div class="alert">⚠️ <b>Note for Doctor:</b> Irregular cycle lengths detected. Some cycles were outside the normal 21-35 day range.</div>` : ''}
<h2>📊 Symptom Frequency (Last 30 Logs)</h2>
${topSyms.length ? `<table><tr><th>Symptom</th><th>Frequency</th></tr>${topSyms.map(([s, c]) => `<tr><td>${s}</td><td>${c} times</td></tr>`).join('')}</table>` : '<p>No symptoms logged yet.</p>'}
<h2>🍕 Trigger Foods</h2>${topFoods.length ? topFoods.map(([f, c]) => `<span class="tag">${f} (${c}x)</span>`).join('') : '<p>No trigger foods logged yet.</p>'}
<h2>📋 Cycle History</h2>${cycles.length ? `<table><tr><th>Start Date</th><th>Length</th><th>Status</th></tr>${cycles.slice(-6).map(c => `<tr><td>${c.startDate}</td><td>${c.length} days</td><td>${c.length < 21 || c.length > 35 ? '⚠️ Irregular' : '✅ Normal'}</td></tr>`).join('')}</table>` : '<p>No cycles logged yet.</p>'}
<p style="margin-top:36px;font-size:11px;color:#999;border-top:1px solid #FFD1DC;padding-top:12px">Generated by Trackulation – Privacy-First Women's Health App. All data stored locally on device only.</p>
</body></html>`;
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a2 = document.createElement('a'); a2.href = url; a2.download = `trackulation_report_${new Date().toISOString().split('T')[0]}.html`; a2.click(); URL.revokeObjectURL(url);
        }

        // ── INIT ───────────────────────────────────────────────────────────────────
        document.getElementById('setup-date').max = new Date().toISOString().split('T')[0];
        if (!settings.lastPeriod) { document.getElementById('setup-modal').style.display = 'flex'; }
        renderPage();
    </script>
</body>

</html>
